<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계산기</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px 16px 12px;
      margin-bottom: 20px;
      text-align: right;
    }

    .display .expression {
      color: #a0aec0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 8px;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }

    button:active {
      transform: scale(0.94);
      opacity: 0.8;
    }

    .btn-number {
      background: #1a365d;
      color: #e2e8f0;
    }

    .btn-number:hover {
      background: #2a4a7f;
    }

    .btn-operator {
      background: #e94560;
      color: #fff;
    }

    .btn-operator:hover {
      background: #ff6b81;
    }

    .btn-clear {
      background: #533483;
      color: #fff;
    }

    .btn-clear:hover {
      background: #7048a8;
    }

    .btn-equal {
      background: #0f9b58;
      color: #fff;
    }

    .btn-equal:hover {
      background: #17c472;
    }

    .btn-zero {
      grid-column: span 2;
    }

    /* 히스토리 */
    .history-toggle {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: #0f3460;
      color: #a0aec0;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s;
    }

    .history-toggle:hover {
      background: #1a4a80;
    }

    .history-panel {
      display: none;
      background: #0f3460;
      border-radius: 10px;
      margin-top: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .history-panel.open {
      display: block;
    }

    .history-panel::-webkit-scrollbar {
      width: 4px;
    }

    .history-panel::-webkit-scrollbar-thumb {
      background: #2a4a7f;
      border-radius: 4px;
    }

    .history-empty {
      color: #4a5568;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    .history-item {
      padding: 12px 16px;
      border-bottom: 1px solid #1a2a4a;
      cursor: pointer;
      transition: background 0.15s;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-item:hover {
      background: #1a4a80;
    }

    .history-item .h-expr {
      color: #a0aec0;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .history-item .h-result {
      color: #e2e8f0;
      font-size: 18px;
      font-weight: 500;
      text-align: right;
    }

    .history-clear {
      width: 100%;
      padding: 8px;
      background: transparent;
      color: #e94560;
      border: none;
      border-top: 1px solid #1a2a4a;
      font-size: 13px;
      cursor: pointer;
    }

    .history-clear:hover {
      background: rgba(233, 69, 96, 0.1);
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="deleteLast()">⌫</button>
      <button class="btn-operator" onclick="inputOperator('%')">%</button>
      <button class="btn-operator" onclick="inputOperator('/')">÷</button>

      <button class="btn-number" onclick="inputNumber('7')">7</button>
      <button class="btn-number" onclick="inputNumber('8')">8</button>
      <button class="btn-number" onclick="inputNumber('9')">9</button>
      <button class="btn-operator" onclick="inputOperator('*')">×</button>

      <button class="btn-number" onclick="inputNumber('4')">4</button>
      <button class="btn-number" onclick="inputNumber('5')">5</button>
      <button class="btn-number" onclick="inputNumber('6')">6</button>
      <button class="btn-operator" onclick="inputOperator('-')">−</button>

      <button class="btn-number" onclick="inputNumber('1')">1</button>
      <button class="btn-number" onclick="inputNumber('2')">2</button>
      <button class="btn-number" onclick="inputNumber('3')">3</button>
      <button class="btn-operator" onclick="inputOperator('+')">+</button>

      <button class="btn-number btn-zero" onclick="inputNumber('0')">0</button>
      <button class="btn-number" onclick="inputDot()">.</button>
      <button class="btn-equal" onclick="calculate()">=</button>
    </div>

    <button class="history-toggle" onclick="toggleHistory()">📋 히스토리 <span id="history-count"></span></button>
    <div class="history-panel" id="history-panel">
      <div class="history-empty" id="history-empty">계산 기록이 없습니다</div>
      <div id="history-list"></div>
      <button class="history-clear" id="history-clear-btn" style="display:none" onclick="clearHistory()">전체 삭제</button>
    </div>
  </div>

  <script>
    let current = '0';
    let expression = '';
    let justCalculated = false;
    let history = JSON.parse(localStorage.getItem('calcHistory') || '[]');

    function updateDisplay() {
      document.getElementById('result').textContent = current;
      document.getElementById('expression').textContent = expression;
    }

    function inputNumber(num) {
      if (justCalculated) {
        current = num;
        expression = '';
        justCalculated = false;
      } else {
        current = current === '0' ? num : current + num;
      }
      updateDisplay();
    }

    function inputDot() {
      if (justCalculated) {
        current = '0.';
        justCalculated = false;
      } else if (!current.includes('.')) {
        current += '.';
      }
      updateDisplay();
    }

    function inputOperator(op) {
      justCalculated = false;
      const opSymbol = { '+': '+', '-': '−', '*': '×', '/': '÷', '%': '%' };
      expression = (expression || current) + ' ' + opSymbol[op] + ' ';
      // store raw op for eval
      expression._raw = (expression._raw || current) + op;
      current = '0';
      updateDisplay();
    }

    function calculate() {
      if (!expression) return;
      try {
        // rebuild raw expression for eval
        const raw = expression.replace(/[+\-×÷%]/g, m => {
          return { '×': '*', '÷': '/', '+': '+', '−': '-', '%': '%' }[m];
        });
        const full = raw.trim() + current;
        let res = Function('"use strict"; return (' + full + ')')();
        // handle floating point
        res = parseFloat(res.toPrecision(12));
        const displayExpr = full.replace(/\*/g, '×').replace(/\//g, '÷').replace(/-/g, '−');
        expression = displayExpr + ' =';
        current = String(res);
        justCalculated = true;
        addHistory(displayExpr, current);
        updateDisplay();
      } catch (e) {
        current = '오류';
        expression = '';
        updateDisplay();
      }
    }

    function clearAll() {
      current = '0';
      expression = '';
      justCalculated = false;
      updateDisplay();
    }

    function deleteLast() {
      if (justCalculated) return;
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }

    // 히스토리 기능
    function addHistory(expr, result) {
      history.unshift({ expr, result });
      if (history.length > 50) history.pop();
      localStorage.setItem('calcHistory', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      const empty = document.getElementById('history-empty');
      const clearBtn = document.getElementById('history-clear-btn');
      const count = document.getElementById('history-count');

      count.textContent = history.length > 0 ? `(${history.length})` : '';
      list.innerHTML = '';

      if (history.length === 0) {
        empty.style.display = 'block';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';
      clearBtn.style.display = 'block';

      history.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<div class="h-expr">${item.expr} =</div><div class="h-result">${item.result}</div>`;
        div.onclick = () => {
          current = item.result;
          expression = '';
          justCalculated = true;
          updateDisplay();
        };
        list.appendChild(div);
      });
    }

    function toggleHistory() {
      const panel = document.getElementById('history-panel');
      panel.classList.toggle('open');
    }

    function clearHistory() {
      history = [];
      localStorage.removeItem('calcHistory');
      renderHistory();
    }

    renderHistory();

    // 키보드 지원
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') inputOperator('+');
      else if (e.key === '-') inputOperator('-');
      else if (e.key === '*') inputOperator('*');
      else if (e.key === '/') { e.preventDefault(); inputOperator('/'); }
      else if (e.key === '%') inputOperator('%');
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') deleteLast();
      else if (e.key === 'Escape') clearAll();
    });
  </script>
</body>
</html>
